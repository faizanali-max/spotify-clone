<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify - Web Player: Music for everyone</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/utility.css">
</head>

<body class="container flex bg-black">
    <div class="left">
        <div class="close">
            <img src="images/close.svg" alt="">
        </div>
        <div class="home bg-grey">
            <div class="logo"><img src="images/logo.svg" alt="logo" class="invert"></div>
            <ul>
                <li><img src="images/home.svg" alt="Home" class="invert">Home</li>
                <li><img src="images/search.svg" alt="Search" class="invert">Search</li>
            </ul>
        </div>

        <div class="library bg-grey rounded">
            <div class="heading">
                <img src="images/playlist.svg" width="22px" class="invert" alt="lib.logo">
                <h3>Your Library</h3>
            </div>
            <div class="songList">
                <ul>
                </ul>
            </div>


            <div class="footer">
                <div><a target="_blank" href="https://www.spotify.com/jp/legal/"><span>Legal</span></a></div>
                <div><a target="_blank" href="https://www.spotify.com/jp/privacy/"><span>Privacy Center</span></a></div>
                <div><a target="_blank" href="https://www.spotify.com/jp/legal/privacy-policy/"><span>Privacy
                            Policy</span></a>
                </div>
                <div><a target="_blank" href="https://www.spotify.com/jp/legal/cookies-policy/"><span>Cookies</span></a>
                </div>
                <div><a target="_blank" href="https://www.spotify.com/jp/legal/privacy-policy/#s3"><span>About
                            Ads</span></a></div>
            </div>
        </div>
    </div>


    <div class="right bg-grey">
        <div class="header">
            <div class="nav">
                <img class="hamburger" src="images/hamburger.svg" alt="">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" color="currentColor"
                    fill="none">
                    <path d="M15 6L9 12.0001L15 18" stroke="#fff" stroke-width="1.5" stroke-miterlimit="16"
                        stroke-linecap="round" stroke-linejoin="round" />
                </svg>
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" color="currentColor"
                    fill="none" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9.00005 6C9.00005 6 15 10.4189 15 12C15 13.5812 9 18 9 18" />
                </svg>
            </div>
            <div class="buttons">
                <button class="signupBtn">Sign Up</button>
                <button class="loginBtn">Log in</button>
            </div>
        </div>
        <div class="spotifyPlaylists">
            <h2>Spotify Playlists</h2>
            <div class="cardContainer">

            </div>
        </div>
        <div class="playbar">
            <div class="abovebar">
                <div class="songName">

                </div>
                <div class="songbuttons">
                    <img id="previous" src="images/prevsong.svg" alt="">
                    <img id="play" src="images/play.svg" alt="">
                    <img id="next" src="images/nextsong.svg" alt="">
                </div>
                <div class="timeVol">
                    <div class="songTime">
                    </div>
                    <div class="volume">
                        <img width="20px" src="images/volume.svg" alt="">
                        <input class="range" type="range" name="volume">
                    </div>
                </div>
            </div>
            <div class="seekbaar">
                <div class="circle">

                </div>
            </div>
        </div>
    </div>
    <script src="js/script.js"></script>
</body>

</html>
